<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Projektkurs Slotmaschine</title>
  <style>
    :root {
      --bg1: #071324;
      --bg2: #2f1d46;
      --panel: rgba(14, 23, 44, 0.88);
      --line: #6ea8ea;
      --text: #e8f1ff;
      --muted: #9bb7db;
      --ok: #8dff9a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 18%, #214f7e 0, transparent 35%),
        radial-gradient(circle at 88% 86%, #553788 0, transparent 40%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .app {
      width: min(560px, 100%);
      border: 2px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 16px 36px rgba(0,0,0,0.45);
      padding: 16px;
    }
    h1 { margin: 0 0 10px; text-align: center; letter-spacing: .08em; font-size: clamp(20px, 5vw, 34px); }
    .stats { display: flex; justify-content: space-between; margin-bottom: 14px; font-weight: 700; color: #d7e6ff; font-size: clamp(15px, 3.8vw, 20px); }
    .reels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
    .reel { border: 2px solid #83b7f3; border-radius: 12px; background: #0a1021; aspect-ratio: 1; display: grid; place-items: center; }
    .msg { min-height: 30px; text-align: center; font-weight: 700; color: var(--muted); margin-bottom: 12px; }
    .msg.win { color: var(--ok); }
    .controls { display: grid; gap: 10px; grid-template-columns: repeat(3, 1fr); }
    button { border: 0; border-radius: 12px; padding: 12px 8px; font-size: clamp(14px, 3.3vw, 18px); font-weight: 700; touch-action: manipulation; }
    .coin { background: linear-gradient(180deg, #bde4ff, #67bbf4); color: #0b2038; }
    .lever { background: linear-gradient(180deg, #e9ffae, #a7db45); color: #203100; }
    .reset { background: linear-gradient(180deg, #ffc7c7, #ef7f7f); color: #3c0b0b; }
    .hint { margin: 12px 0 0; text-align: center; color: #b7cae5; font-size: 13px; }
  </style>
</head>
<body>
  <main class="app">
    <h1>SLOTMASCHINE</h1>
    <section class="stats">
      <div>Credits: <span id="credits">10</span></div>
      <div>Best: <span id="best">10</span></div>
    </section>

    <section class="reels" aria-label="Walzen">
      <div id="r0" class="reel"></div>
      <div id="r1" class="reel"></div>
      <div id="r2" class="reel"></div>
    </section>

    <div id="msg" class="msg"></div>

    <section class="controls">
      <button id="coin" class="coin">C Coin</button>
      <button id="lever" class="lever">L Lever</button>
      <button id="reset" class="reset">Reset</button>
    </section>

    <p class="hint">C Coin   L Lever   R Reset</p>
  </main>

  <script>
    let SPIN_DURATIONS = [3100, 3900, 4800];
    let symbols = [
      "slot_assets/sym_0.png",
      "slot_assets/sym_1.png",
      "slot_assets/sym_2.png",
      "slot_assets/sym_3.png",
      "slot_assets/sym_4.png"
    ];

    const creditsEl = document.getElementById("credits");
    const bestEl = document.getElementById("best");
    const msgEl = document.getElementById("msg");
    const leverBtn = document.getElementById("lever");
    const reels = [0, 1, 2].map(i => document.getElementById(`r${i}`));

    let spinning = false;
    let winBlinkTimer = null;
    let messageTimer = null;
    let state = { credits: 10, best: 10 };

    function render(message = "", won = false) {
      creditsEl.textContent = state.credits;
      bestEl.textContent = state.best;
      msgEl.textContent = message;
      msgEl.className = won ? "msg win" : "msg";
    }

    function randomIndex() {
      return Math.floor(Math.random() * symbols.length);
    }

    function setReels(a, b, c) {
      reels[0].innerHTML = `<img src="${symbols[a]}" alt="Symbol" style="width:88%;height:88%;object-fit:contain;">`;
      reels[1].innerHTML = `<img src="${symbols[b]}" alt="Symbol" style="width:88%;height:88%;object-fit:contain;">`;
      reels[2].innerHTML = `<img src="${symbols[c]}" alt="Symbol" style="width:88%;height:88%;object-fit:contain;">`;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function fetchJson(url, options = {}) {
      const res = await fetch(url, {
        method: options.method || "GET",
        headers: { "Content-Type": "application/json" },
        credentials: "include"
      });
      const data = await res.json();
      if (!res.ok) throw data;
      return data;
    }

    async function loadState() {
      try {
        const config = await fetchJson("/api/config");
        if (Array.isArray(config.spin_durations_ms) && config.spin_durations_ms.length === 3) {
          SPIN_DURATIONS = config.spin_durations_ms;
        }
        if (Array.isArray(config.symbols) && config.symbols.length > 0) {
          symbols = config.symbols;
        }
      } catch (_) {}

      const data = await fetchJson("/api/state");
      state = { credits: data.credits, best: data.best };
      render("", false);
    }

    async function spin() {
      if (spinning) return;
      spinning = true;
      leverBtn.disabled = true;

      let result;
      try {
        result = await fetchJson("/api/spin", { method: "POST" });
      } catch (err) {
        if (err && err.message === "KEINE CREDITS") {
          state = { credits: err.credits, best: err.best };
          render("KEINE CREDITS", false);
          if (messageTimer) clearTimeout(messageTimer);
          messageTimer = setTimeout(() => render("", false), 1500);
        }
        leverBtn.disabled = false;
        spinning = false;
        return;
      }

      state = { credits: result.credits, best: result.best };
      render("", false);

      const start = performance.now();
      const current = [randomIndex(), randomIndex(), randomIndex()];
      const lastStepTime = [0, 0, 0];
      const minStep = [48, 52, 56];
      const maxStep = [130, 140, 150];

      while (true) {
        const now = performance.now();
        let runningAny = false;

        for (let i = 0; i < 3; i++) {
          const elapsed = now - start;
          if (elapsed < SPIN_DURATIONS[i]) {
            runningAny = true;
            const progress = elapsed / SPIN_DURATIONS[i];
            const stepInterval = minStep[i] + (maxStep[i] - minStep[i]) * Math.pow(progress, 1.7);
            const elapsedSince = now - lastStepTime[i];
            const steps = Math.floor(elapsedSince / stepInterval);
            if (steps > 0) {
              current[i] = (current[i] + steps) % symbols.length;
              lastStepTime[i] += steps * stepInterval;
            }
          } else {
            current[i] = result.reels[i];
          }
        }

        setReels(current[0], current[1], current[2]);
        if (!runningAny) break;
        await sleep(4);
      }

      await sleep(500);

      if (result.won) {
        render(" GEWONNEN! ", true);
        if (winBlinkTimer) clearInterval(winBlinkTimer);
        winBlinkTimer = setInterval(() => {
          msgEl.style.visibility = msgEl.style.visibility === "hidden" ? "visible" : "hidden";
        }, 300);
        await sleep(4000);
        clearInterval(winBlinkTimer);
        winBlinkTimer = null;
        msgEl.style.visibility = "visible";
        render("", false);
      }

      leverBtn.disabled = false;
      spinning = false;
    }

    document.getElementById("coin").addEventListener("click", async () => {
      const data = await fetchJson("/api/coin", { method: "POST" });
      state = { credits: data.credits, best: data.best };
      render("", false);
    });

    document.getElementById("reset").addEventListener("click", async () => {
      const data = await fetchJson("/api/reset", { method: "POST" });
      state = { credits: data.credits, best: data.best };
      render("", false);
    });

    leverBtn.addEventListener("click", spin);
    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "c") document.getElementById("coin").click();
      if (key === "l") leverBtn.click();
      if (key === "r") document.getElementById("reset").click();
    });

    setReels(0, 1, 4);
    loadState();
  </script>
</body>
</html>
