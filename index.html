<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Slotmaschine Mobile</title>
  <style>
    :root {
      --bg1: #08101f;
      --bg2: #2e1644;
      --panel: #111b33;
      --accent: #6dc8ff;
      --win: #8aff8d;
      --text: #e8f1ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 15% 20%, #1d4570 0%, transparent 35%),
                  radial-gradient(circle at 85% 85%, #4e2f7c 0%, transparent 40%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .app {
      width: min(520px, 100%);
      background: rgba(17, 27, 51, 0.86);
      border: 2px solid #528cd4;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.45);
    }
    h1 { margin: 0 0 12px; text-align: center; letter-spacing: 0.06em; }
    .stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-weight: 700;
    }
    .reels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .reel {
      background: #0a1123;
      border: 2px solid #73a7eb;
      border-radius: 12px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      font-size: clamp(44px, 12vw, 70px);
      user-select: none;
    }
    .msg {
      min-height: 28px;
      text-align: center;
      font-weight: 700;
      margin-bottom: 12px;
      color: #b9d7ff;
    }
    .msg.win { color: var(--win); }
    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 8px;
      font-size: 16px;
      font-weight: 700;
      color: #041021;
      background: linear-gradient(180deg, #a7ddff, #59b5f4);
      touch-action: manipulation;
    }
    button:active { transform: translateY(1px) scale(0.995); }
    .lever {
      color: #102300;
      background: linear-gradient(180deg, #e6ff9a, #9fda39);
    }
    .reset {
      color: #2b0707;
      background: linear-gradient(180deg, #ffb2b2, #ef6d6d);
    }
    .hint {
      margin-top: 12px;
      font-size: 13px;
      opacity: 0.85;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>SLOTMASCHINE</h1>
    <section class="stats">
      <div>Credits: <span id="credits">10</span></div>
      <div>Best: <span id="best">10</span></div>
    </section>

    <section class="reels" aria-label="Walzen">
      <div class="reel" id="r0">🍒</div>
      <div class="reel" id="r1">🍋</div>
      <div class="reel" id="r2">⭐</div>
    </section>

    <div id="msg" class="msg">Viel Erfolg!</div>

    <section class="controls">
      <button id="coin">Coin +1</button>
      <button id="lever" class="lever">Hebel drehen</button>
      <button id="reset" class="reset">Reset</button>
    </section>

    <p class="hint">Tipp: Auf demselben WLAN kann jeder die Seite über deinen Rechner öffnen.</p>
  </main>

  <script>
    const START_CREDITS = 10;
    const WIN_REWARD = 4;
    const WIN_CHANCE = 0.20;
    const symbols = ["🍒", "🍋", "🍊", "🍇", "⭐", "🔔"];

    const elCredits = document.getElementById("credits");
    const elBest = document.getElementById("best");
    const elMsg = document.getElementById("msg");
    const reelEls = [0,1,2].map(i => document.getElementById(`r${i}`));
    const btnCoin = document.getElementById("coin");
    const btnLever = document.getElementById("lever");
    const btnReset = document.getElementById("reset");

    let state = loadState();
    let spinning = false;

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem("slot-mobile-state") || "{}");
        const credits = Number.isFinite(saved.credits) ? saved.credits : START_CREDITS;
        const best = Number.isFinite(saved.best) ? saved.best : Math.max(START_CREDITS, credits);
        return { credits, best };
      } catch {
        return { credits: START_CREDITS, best: START_CREDITS };
      }
    }

    function saveState() {
      localStorage.setItem("slot-mobile-state", JSON.stringify(state));
    }

    function render(msg = "", win = false) {
      elCredits.textContent = state.credits;
      elBest.textContent = state.best;
      elMsg.textContent = msg || "Viel Erfolg!";
      elMsg.className = win ? "msg win" : "msg";
    }

    function randIdx() {
      return Math.floor(Math.random() * symbols.length);
    }

    function setReels(a, b, c) {
      reelEls[0].textContent = symbols[a];
      reelEls[1].textContent = symbols[b];
      reelEls[2].textContent = symbols[c];
    }

    async function spin() {
      if (spinning) return;
      if (state.credits <= 0) {
        render("Keine Credits", false);
        return;
      }
      spinning = true;
      btnLever.disabled = true;
      state.credits -= 1;
      saveState();
      render("Dreht...", false);

      for (let t = 0; t < 18; t++) {
        setReels(randIdx(), randIdx(), randIdx());
        await new Promise(r => setTimeout(r, 70 + t * 3));
      }

      let a = randIdx(), b = randIdx(), c = randIdx();
      if (Math.random() < WIN_CHANCE) {
        a = b = c = randIdx();
      }
      setReels(a, b, c);

      if (a === b && b === c) {
        state.credits += WIN_REWARD;
        state.best = Math.max(state.best, state.credits);
        saveState();
        render("Gewonnen! +4", true);
      } else {
        saveState();
        render("Leider knapp daneben", false);
      }

      btnLever.disabled = false;
      spinning = false;
    }

    btnCoin.addEventListener("click", () => {
      state.credits += 1;
      state.best = Math.max(state.best, state.credits);
      saveState();
      render("Coin eingeworfen", false);
    });

    btnReset.addEventListener("click", () => {
      state = { credits: START_CREDITS, best: START_CREDITS };
      saveState();
      render("Zurueckgesetzt", false);
    });

    btnLever.addEventListener("click", spin);

    setReels(0, 1, 4);
    render();
  </script>
</body>
</html>
